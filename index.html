<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Pokemon World</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #ffcb05;
      font-family: "Segoe UI", sans-serif;
    }

    .card {
      background: #fff;
      border: 4px solid #3d7dca;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(61, 125, 202, 0.2);
    }

    .pokeball {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2.5rem;
      color: #3d7dca;
      margin: 0 0 8px;
    }

    p {
      font-size: 1rem;
      color: #666;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="pokeball">⚪</div>
    <h1>Hello Pokemon World!</h1>
    <p>Gotta catch 'em all.</p>
  </div>
</body>
</html>
